apiVersion: apps/v1
kind: Deployment
metadata:
  name: supply-chain-demo
  namespace: supply-chain-demo
  labels:
    app.kubernetes.io/name: supply-chain-demo
    app.kubernetes.io/part-of: supply-chain-security-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: supply-chain-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: supply-chain-demo
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # IMAGE_PLACEHOLDER — replaced by CI pipeline with signed, verified image digest
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: IMAGE_SIGNED
              value: "true"
            - name: SBOM_ATTACHED
              value: "true"
            - name: PROVENANCE_ATTACHED
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: supply-chain-demo
