name: Verify & Deploy

on:
  workflow_run:
    workflows: ["Build, Sign & Attest"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_digest:
        description: "Image digest to deploy (sha256:...)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: supply-chain-sec-dev-app
  EKS_CLUSTER: supply-chain-sec-dev-eks
  OIDC_ISSUER: https://token.actions.githubusercontent.com
  IDENTITY_REGEXP: github.com/nfroze/Supply-Chain-Security-Pipeline

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Resolve image digest
  # ─────────────────────────────────────────
  resolve:
    name: Resolve Image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      digest: ${{ steps.resolve.outputs.digest }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image digest
        id: resolve
        run: |
          REGISTRY="${{ steps.login.outputs.registry }}"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            DIGEST="${{ inputs.image_digest }}"
          else
            # Get the latest image pushed to the repository
            DIGEST=$(aws ecr describe-images \
              --repository-name "${ECR_REPOSITORY}" \
              --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageDigest' \
              --output text)
          fi

          IMAGE="${REGISTRY}/${ECR_REPOSITORY}@${DIGEST}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved image: ${IMAGE}"

  # ─────────────────────────────────────────
  # Stage 2: Verify signature
  # ─────────────────────────────────────────
  verify-signature:
    name: Verify Signature
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Verify cosign signature
        run: |
          echo "=========================================="
          echo "STEP 1/5: Signature Verification"
          echo "=========================================="
          echo "Image: ${{ needs.resolve.outputs.image }}"
          echo ""

          RESULT=$(cosign verify "${{ needs.resolve.outputs.image }}" \
            --certificate-oidc-issuer="${OIDC_ISSUER}" \
            --certificate-identity-regexp="${IDENTITY_REGEXP}" 2>&1)

          echo "${RESULT}" | jq .
          echo ""
          echo "SIGNATURE VERIFICATION: PASSED"

  # ─────────────────────────────────────────
  # Stage 3: Verify SLSA provenance
  # ─────────────────────────────────────────
  verify-provenance:
    name: Verify Provenance
    runs-on: ubuntu-latest
    needs: [resolve, verify-signature]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Verify SLSA provenance attestation
        run: |
          echo "=========================================="
          echo "STEP 2/5: Provenance Verification"
          echo "=========================================="

          RESULT=$(cosign verify-attestation "${{ needs.resolve.outputs.image }}" \
            --type slsaprovenance \
            --certificate-oidc-issuer="${OIDC_ISSUER}" \
            --certificate-identity-regexp="${IDENTITY_REGEXP}" 2>&1)

          # Extract and display provenance details
          echo "${RESULT}" | jq -r '.payload' | base64 -d | jq '.predicate'
          echo ""
          echo "PROVENANCE VERIFICATION: PASSED"

  # ─────────────────────────────────────────
  # Stage 4: Verify SBOM attestations
  # ─────────────────────────────────────────
  verify-sbom:
    name: Verify SBOMs
    runs-on: ubuntu-latest
    needs: [resolve, verify-provenance]
    env:
      GRYPE_DB_AUTO_UPDATE: "true"
      GRYPE_DB_MAX_ALLOWED_BUILT_AGE: "120h"
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Install Grype
        uses: anchore/scan-action/download-grype@v4
        with:
          grype-version: "v0.88.0"

      - name: Update Grype vulnerability database
        run: |
          grype db delete || true
          grype db update
          grype db status

      - name: Verify and extract SPDX SBOM
        run: |
          echo "=========================================="
          echo "STEP 3/5: SBOM Verification"
          echo "=========================================="

          echo "Verifying SPDX attestation..."
          cosign verify-attestation "${{ needs.resolve.outputs.image }}" \
            --type spdxjson \
            --certificate-oidc-issuer="${OIDC_ISSUER}" \
            --certificate-identity-regexp="${IDENTITY_REGEXP}" \
            | jq -r '.payload' | base64 -d | jq '.predicate' > sbom-spdx.json

          PACKAGES=$(jq '.packages | length' sbom-spdx.json)
          echo "SPDX SBOM contains ${PACKAGES} packages"

          echo ""
          echo "Verifying CycloneDX attestation..."
          cosign verify-attestation "${{ needs.resolve.outputs.image }}" \
            --type cyclonedx \
            --certificate-oidc-issuer="${OIDC_ISSUER}" \
            --certificate-identity-regexp="${IDENTITY_REGEXP}" \
            | jq -r '.payload' | base64 -d | jq '.predicate' > sbom-cyclonedx.json

          COMPONENTS=$(jq '.components | length' sbom-cyclonedx.json)
          echo "CycloneDX SBOM contains ${COMPONENTS} components"
          echo ""
          echo "SBOM VERIFICATION: PASSED"

      - name: Re-scan SBOMs for vulnerabilities at deploy time
        run: |
          echo "=========================================="
          echo "STEP 4/5: Deploy-Time Vulnerability Check"
          echo "=========================================="

          echo "Re-scanning SPDX SBOM against latest vulnerability data..."
          grype sbom:sbom-spdx.json \
            --output table \
            --fail-on critical \
            --add-cpes-if-none

          echo ""
          echo "Re-scanning CycloneDX SBOM..."
          grype sbom:sbom-cyclonedx.json \
            --output json \
            --fail-on critical \
            --add-cpes-if-none > grype-deploy-results.json

          TOTAL=$(jq '.matches | length' grype-deploy-results.json)
          CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' grype-deploy-results.json)
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")] | length' grype-deploy-results.json)
          echo ""
          echo "Deploy-time scan: ${TOTAL} total, ${CRITICAL} critical, ${HIGH} high"
          echo "DEPLOY-TIME VULNERABILITY CHECK: PASSED"

  # ─────────────────────────────────────────
  # Stage 5: Deploy to EKS
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [resolve, verify-signature, verify-provenance, verify-sbom]
    environment: production
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER}"

      - name: Create namespace if not exists
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Deploy application with verified image
        run: |
          echo "=========================================="
          echo "STEP 5/5: Deployment"
          echo "=========================================="
          echo "Deploying verified image: ${{ needs.resolve.outputs.image }}"
          echo ""

          # Replace IMAGE_PLACEHOLDER with the verified image digest
          sed "s|IMAGE_PLACEHOLDER|${{ needs.resolve.outputs.image }}|g" \
            k8s/deployment.yaml | kubectl apply -f -

          kubectl apply -f k8s/service.yaml

          # Add build metadata as environment variables
          kubectl set env deployment/supply-chain-demo \
            -n supply-chain-demo \
            IMAGE_DIGEST="${{ needs.resolve.outputs.digest }}" \
            COMMIT_SHA="${GITHUB_SHA}" \
            BUILD_TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            SLSA_LEVEL="2"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/supply-chain-demo \
            -n supply-chain-demo \
            --timeout=120s

      - name: Verify deployment
        run: |
          echo ""
          echo "=========================================="
          echo "Deployment Verification"
          echo "=========================================="
          kubectl get pods -n supply-chain-demo -o wide
          echo ""
          kubectl get deployment supply-chain-demo -n supply-chain-demo
          echo ""

          # Health check via port-forward
          kubectl port-forward svc/supply-chain-demo 8080:80 -n supply-chain-demo &
          sleep 5

          echo "Health check:"
          curl -s http://localhost:8080/healthz | jq .
          echo ""
          echo "Supply chain status:"
          curl -s http://localhost:8080/supply-chain/status | jq .

          kill %1 2>/dev/null || true

  # ─────────────────────────────────────────
  # Summary
  # ─────────────────────────────────────────
  verification-summary:
    name: Verification Summary
    runs-on: ubuntu-latest
    needs: [resolve, verify-signature, verify-provenance, verify-sbom, deploy]
    if: always()
    steps:
      - name: Generate verification summary
        run: |
          echo "## Verification & Deployment Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verification Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 1. Signature Verification | ${{ needs.verify-signature.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 2. Provenance Verification | ${{ needs.verify-provenance.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 3. SBOM Verification & Vuln Scan | ${{ needs.verify-sbom.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 4. Deployment | ${{ needs.deploy.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${{ needs.resolve.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Verification Chain" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Signature ✓ → Provenance ✓ → SBOM ✓ → Vuln Scan ✓ → Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"